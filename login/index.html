<!DOCTYPE html>
<html data-theme="aqua" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="../output.css" rel="stylesheet">
    <link href="../auth.css" rel="stylesheet">
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          referrerpolicy="no-referrer" rel="stylesheet"/>
    <title>Signin to diabetes monitor</title>

</head>
<body class="text-center text-white">

<!--the form-->
<div>
    <main>
        <div>
            <main>
                <div class="center">
                    <div class="myform p-8 md:p-12">
                        <h1 class="text-5xl m-1 font-roboto">Welcome!</h1>

                        <form action="" class="font-bold" method="post">
                            <br><label for="email">Email</label><br>
                            <input class="input input-md" placeholder="mail@site.com" required type="email">
                            <br><br>
                            <label for="password">Password</label><br>
                            <input class="input input-md" required type="password">
                            <br><br>
                            <button class="btn mt-2 items-center text-white bg-blue-500 border-black"
                                    onclick=execute()
                                    type="submit"><p
                                    id="button">SIGN IN</p> <i class="fa-solid fa-sign-in fa-xl"></i></button>
                        </form>
                        <br>
                        <p class="">Not registered? <a class="link link-warning" href="../register/">Register now <i
                                class="fa-solid fa-arrow-right"></i></a></p><br>

                    </div>
                </div>


                <!--the footer-->
                <footer class="m-5">
                    <p class="italic">Have a problem? <a class="link" href="../support/">Help</a></p><br>
                    <p><a class="link link-warning" href="../index.html"><i class="fa-solid fa-arrow-left"></i> HOME</a>
                    </p>
                </footer>


            </main>
        </div>
    </main>
</div>

<script>
    function execute() {
        document.getElementById("button").innerHTML = "Welcome back";
    }

    function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('hidden');
    }
</script>
</body>
</html>
