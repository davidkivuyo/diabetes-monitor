<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../output.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Signup to diabetes monitor</title>
    <style>
.mygrid{
  display: grid;
  grid-gap: 2rem;
  grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
  padding: clamp(32px, 5vw, 80px);
        }
        @keyframes myhero{
            0%{background-image: linear-gradient(blueviolet,rgb(241, 228, 166),greenyellow);}
            50%{background-image: linear-gradient(greenyellow,wheat,blueviolet);}
            100%{background-image: linear-gradient(hotpink,yellow,gray);}
        }
        .myhero{
            animation: myhero 10s 1s infinite linear;
            border: 1rem;
            padding: 5rem;
            color: blueviolet;
            border-radius: 1rem;
            position: relative;
        }
        .myform{

        }
    </style>
</head>
<body class="relative">
<section class="absolute top-[50%] right-[50%]">
<main class="mygrid">
    <div class="border-0 myhero">
<a href="../index.html" style="position: absolute; top: 40%; right: 40%;"><h1 class=" font-bold text-5xl font-mono">LOGO</h1></a>
</div>
<div class="myform">
    <h1 class="text-7xl font-bold font-mono">Sign up</h1>
    <div class="p-8">
<form action="" method="post" class="text-center font-bold justify-center items-center p-2">
<label class="floating-label">
  <span>Name</span>
  <input type="text" placeholder="name" class="input input-md mt-2" required>
</label>
<label class="floating-label">
  <span>Your Email</span>
  <input type="email" placeholder="mail@site.com" class="input input-md mt-2" required>
</label>
<label class="floating-label">
  <span>Your strong password</span>
  <input type="password" class="input input-md mt-2" required>
</label>
<button type="submit" class="btn mt-2">SIGN UP <i class="fa-solid fa-arrow-right"></i></button>
</form>

</div>

</div>
</main>
</section>

<footer>
    <p class="text-center mt-5">&copy; 2026 Larason systems</p>
</footer>
</body>
</html>
